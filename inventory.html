<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff5f6d" />
    <meta name="description" content="Inventory management form for SwiftOrder" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.svg" />
    <title>Inventory Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero-card">
        <div class="hero-badge">📦 Inventory</div>
        <h1>Manage Inventory</h1>
        <p>Add new product details and store them in your Google Sheet.</p>
      </header>

      <main class="container">
        <section class="card form-card">
          <div class="card-header">
            <div>
              <p class="eyebrow">Inventory Details</p>
              <h2>New Product</h2>
            </div>
            <span class="pill">Google Sheet</span>
          </div>

          <form id="inventoryForm" novalidate>
            <label class="field">
              <span>Product name</span>
              <input id="productName" type="text" placeholder="Enter product name" maxlength="100" required />
            </label>

            <label class="field">
              <span>Stock</span>
              <input id="stock" type="number" min="0" step="1" placeholder="Enter stock quantity" required />
            </label>

            <label class="field">
              <span>Price for each</span>
              <input id="price" type="number" min="0" step="0.01" placeholder="Enter price per unit" required />
            </label>

            <label class="field">
              <span>Product description</span>
              <textarea id="description" rows="4" placeholder="Enter a short description"></textarea>
            </label>

            <label class="field">
              <span>Product image (optional)</span>
              <input id="productImage" type="file" accept="image/*" />
            </label>

            <div id="imagePreview" class="image-preview hidden"></div>

            <button id="saveInventoryBtn" class="primary-btn" type="submit">Save Inventory</button>
            <a href="index.html" class="secondary-btn">Back to Orders</a>
          </form>
        </section>
      </main>
    </div>

    <div id="loadingOverlay" class="loading-overlay hidden" aria-hidden="true">
      <div class="spinner-box">
        <div class="spinner"></div>
        <p>Saving inventory...</p>
      </div>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="assertive"></div>

    <script src="inventory.js"></script>
  </body>
</html>
